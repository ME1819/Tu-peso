<html lang="es">
<head>
<meta charset="UTF-8">
<title>Coloca tu peso 😈</title>

<style>
  body{
    font-family: Arial;
    text-align: center;
    margin-top: 50px;
    overflow: hidden;
  }

  input, button{
    padding: 10px;
    font-size: 16px;
  }

  /* CONTENEDORES */
  .meme{
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    justify-content: center;
    align-items: center;
  }

  /* IMAGEN */
  .meme img{
    width: 500px;
    opacity: 0;
  }

  /* ANIMACIÓN */
  .animar img{
    animation: aparecer 1s ease forwards, girar 2s linear infinite;
  }

  @keyframes aparecer{
    0%{
      opacity: 0;
      transform: scale(0.3);
    }
    100%{
      opacity: 1;
      transform: scale(1);
    }
  }

  @keyframes girar{
    from{
      transform: rotate(0deg);
    }
    to{
      transform: rotate(360deg);
    }
  }
</style>

</head>
<body>

<h2>Ingresa tu peso 😈</h2>

<input type="number" id="peso" placeholder="Ej: 80">
<button onclick="verificar()">Calcular</button>

<!-- MEME >100 -->
<div id="meme1" class="meme">
  <img src="meme1.png">
</div>

<!-- MEME <60 -->
<div id="meme2" class="meme">
  <img src="meme2.png">
</div>

<!-- AUDIOS -->
<audio id="audio1" src="audio1.mp4"></audio>
<audio id="audio2" src="audio2.mp4"></audio>

<script>
function verificar(){
  let peso = document.getElementById("peso").value;

  let meme1 = document.getElementById("meme1");
  let meme2 = document.getElementById("meme2");

  let audio1 = document.getElementById("audio1");
  let audio2 = document.getElementById("audio2");

  // Resetear todo
  meme1.style.display = "none";
  meme2.style.display = "none";
  audio1.pause();
  audio2.pause();

  if(peso >=65){
    meme1.style.display = "flex";

    meme1.classList.remove("animar");
    void meme1.offsetWidth;
    meme1.classList.add("animar");

    audio1.currentTime = 0;
    audio1.play();

  } else if(peso < 65){
    meme2.style.display = "flex";

    meme2.classList.remove("animar");
    void meme2.offsetWidth;
    meme2.classList.add("animar");

    audio2.currentTime = 0;
    audio2.play();

  } else {
    alert("Peso normal 👍");
  }
}
</script>

</body>
</html>
